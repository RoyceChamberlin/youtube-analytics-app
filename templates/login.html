<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chamberlin Media Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000;color:#e8e8e8;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh}
.card{width:340px;text-align:center;padding:40px 32px;background:#0a0a0a;border:1px solid #1a1a1a;border-radius:16px;box-shadow:0 0 60px rgba(0,0,0,.8)}
.logo{width:54px;height:54px;background:#ff2244;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;margin:0 auto 20px;box-shadow:0 0 30px rgba(255,34,68,.4)}
h1{font-size:18px;font-weight:700;color:#fff;margin-bottom:6px}
p{font-size:13px;color:#444;margin-bottom:28px}
input{width:100%;background:#111;border:1px solid #222;border-radius:8px;color:#e8e8e8;font-family:'Inter',sans-serif;font-size:14px;padding:12px 14px;margin-bottom:12px;outline:none;transition:border-color .2s}
input:focus{border-color:#ff2244;box-shadow:0 0 0 3px rgba(255,34,68,.15)}
button{width:100%;padding:12px;border-radius:8px;border:none;cursor:pointer;background:#ff2244;color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;transition:all .2s;box-shadow:0 0 20px rgba(255,34,68,.3)}
button:hover{box-shadow:0 0 32px rgba(255,34,68,.5)}
.err{color:#ff6680;font-size:13px;margin-bottom:10px;background:rgba(255,34,68,.08);border:1px solid rgba(255,34,68,.2);border-radius:6px;padding:8px 12px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">▶</div>
  <h1>Chamberlin Media Monitor</h1>
  <p>Enter your team password to continue</p>
  {% if error %}<div class="err">{{ error }}</div>{% endif %}
  <form method="POST">
    <input type="password" name="password" placeholder="Password" autofocus required>
    <button type="submit">Sign In</button>
  </form>
</div>
</body>
</html>
